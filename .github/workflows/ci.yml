name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Bundle sizes ==="
          ls -la dist/index.js dist/react.js dist/ping-toast.min.global.js
          echo "=== Gzipped ==="
          gzip -c dist/index.js | wc -c
          gzip -c dist/react.js | wc -c
          gzip -c dist/ping-toast.min.global.js | wc -c

      - name: Verify exports
        run: |
          node -e "const p = require('./dist/index.cjs'); console.log('Core exports:', Object.keys(p).join(', '))"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Publish (if version changed)
        run: |
          CURRENT=$(npm view ping-toast version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$LOCAL" ]; then
            npm publish --access public
          else
            echo "Version $LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
