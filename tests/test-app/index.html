<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingToast — Test Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['system-ui', '-apple-system', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans min-h-screen transition-colors">
  <div class="max-w-2xl mx-auto px-6 py-12">

    <!-- Header -->
    <div class="flex items-center justify-between mb-10">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">PingToast Playground</h1>
        <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Test every feature interactively</p>
      </div>
      <button id="theme-btn" class="p-2.5 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
        <svg id="sun" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="moon" class="w-4 h-4 dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <!-- Toast Types -->
    <section class="mb-8">
      <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">Toast Types</h2>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="toast('Default toast')" class="btn">Default</button>
        <button onclick="toast.success('Saved!')" class="btn text-green-600 dark:text-green-400 border-green-200 dark:border-green-800">Success</button>
        <button onclick="toast.error('Failed!')" class="btn text-red-600 dark:text-red-400 border-red-200 dark:border-red-800">Error</button>
        <button onclick="toast.warning('Careful!')" class="btn text-amber-600 dark:text-amber-400 border-amber-200 dark:border-amber-800">Warning</button>
        <button onclick="toast.info('FYI!')" class="btn text-blue-600 dark:text-blue-400 border-blue-200 dark:border-blue-800">Info</button>
        <button onclick="toast.loading('Loading...')" class="btn text-indigo-600 dark:text-indigo-400 border-indigo-200 dark:border-indigo-800">Loading</button>
      </div>
    </section>

    <!-- Async -->
    <section class="mb-8">
      <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">Async</h2>
      <div class="grid grid-cols-2 gap-2">
        <button onclick="testPromise(true)" class="btn">Promise (success)</button>
        <button onclick="testPromise(false)" class="btn">Promise (fail)</button>
        <button onclick="testConfirm()" class="btn">Confirm Dialog</button>
        <button onclick="testAlert()" class="btn">Alert Dialog</button>
      </div>
    </section>

    <!-- Actions -->
    <section class="mb-8">
      <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">Actions & Options</h2>
      <div class="grid grid-cols-2 gap-2">
        <button onclick="testUndo()" class="btn">Undo Action</button>
        <button onclick="testUpdate()" class="btn">Loading → Success</button>
        <button onclick="testTitle()" class="btn">Title + Desc</button>
        <button onclick="testCustom()" class="btn">Custom HTML</button>
      </div>
    </section>

    <!-- Positions -->
    <section class="mb-8">
      <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">Positions</h2>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="setPos('top-left')" class="btn text-xs">Top Left</button>
        <button onclick="setPos('top-center')" class="btn text-xs">Top Center</button>
        <button onclick="setPos('top-right')" class="btn text-xs">Top Right</button>
        <button onclick="setPos('bottom-left')" class="btn text-xs">Bottom Left</button>
        <button onclick="setPos('bottom-center')" class="btn text-xs">Bottom Center</button>
        <button onclick="setPos('bottom-right')" class="btn text-xs">Bottom Right</button>
      </div>
    </section>

    <!-- Controls -->
    <section class="mb-8">
      <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">Controls</h2>
      <button onclick="toast.dismissAll()" class="w-full btn text-red-600 dark:text-red-400 border-red-200 dark:border-red-800">Dismiss All</button>
    </section>

    <!-- Footer -->
    <p class="text-center text-xs text-zinc-400 dark:text-zinc-600 mt-12">
      ping-toast test playground · <a href="https://pingtoast.1619.in" class="underline">docs</a> · <a href="https://github.com/KumarDeepak16/ping-toast" class="underline">github</a>
    </p>
  </div>

  <style>
    .btn { @apply px-4 py-2.5 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-sm font-medium cursor-pointer transition-all hover:shadow-sm active:scale-[0.97]; }
  </style>

  <script type="module">
    import { toast, createToaster, applyTheme } from 'ping-toast'

    createToaster({ position: 'top-right', duration: 3500 })
    window.toast = toast

    // Theme toggle
    document.getElementById('theme-btn').onclick = () => {
      document.documentElement.classList.toggle('dark')
      const isDark = document.documentElement.classList.contains('dark')
      applyTheme(isDark ? 'dark' : 'light')
    }

    window.testPromise = (shouldPass) => {
      const p = new Promise((res, rej) => setTimeout(() => shouldPass ? res({ count: 42 }) : rej(new Error('Network error')), 2000))
      toast.promise(p, { loading: 'Fetching...', success: d => `Got ${d.count} items`, error: e => e.message })
    }

    window.testConfirm = async () => {
      const ok = await toast.confirm('Delete permanently?', { confirm: 'Delete', cancel: 'Keep' })
      if (ok) toast.success('Deleted!'); else toast.info('Cancelled')
    }

    window.testAlert = async () => {
      await toast.alert('Session expired. Please log in.')
      toast.info('Alert dismissed')
    }

    window.testUndo = () => {
      toast.error('File deleted', { action: { label: 'Undo', onClick: id => { toast.dismiss(id); toast.success('Restored!') } } })
    }

    window.testUpdate = () => {
      const id = toast.loading('Uploading...')
      setTimeout(() => toast.update(id, { type: 'success', message: 'Done!', duration: 3000 }), 2000)
    }

    window.testTitle = () => toast.success('Deployed', { title: 'Production', description: 'v2.1.0 → 3 regions' })

    window.testCustom = () => toast.custom(() =>
      `<div style="padding:12px 16px;display:flex;gap:10px;align-items:center"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#ec4899);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px">PT</div><div><strong style="font-size:13px">PingToast</strong><div style="font-size:11px;opacity:.6">Custom render</div></div></div>`,
      { duration: 5000 })

    window.setPos = (pos) => { createToaster({ position: pos }); toast.success(`Position: ${pos}`) }
  </script>
</body>
</html>
