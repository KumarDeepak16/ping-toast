<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingToast — Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui']}}}}</script>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans min-h-screen flex items-start justify-center pt-16 pb-20">

  <div class="w-full max-w-2xl px-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-2.5">
        <img src="https://pingtoast.1619.in/logo.png" alt="" class="w-7 h-7 rounded-lg" />
        <span class="text-sm font-semibold tracking-tight">Playground</span>
      </div>
      <button id="t" class="p-1.5 rounded-md hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer transition-colors">
        <svg class="w-4 h-4 dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>

    <!-- Custom message -->
    <p class="label">Message</p>
    <div class="flex gap-1.5 mb-6">
      <input id="msg" type="text" placeholder="Type your toast message..." value="Hello from PingToast!"
        class="flex-1 px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-[12px] outline-none focus:border-indigo-400 dark:focus:border-indigo-500 transition-colors" />
      <select id="msg-type" class="px-2 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-[11px] outline-none cursor-pointer">
        <option value="default">Default</option>
        <option value="success">Success</option>
        <option value="error">Error</option>
        <option value="warning">Warning</option>
        <option value="info">Info</option>
        <option value="loading">Loading</option>
      </select>
      <button onclick="fireCustom()" class="px-3 py-2 rounded-lg bg-indigo-500 text-white text-[11px] font-medium cursor-pointer hover:bg-indigo-600 transition-colors">Send</button>
    </div>

    <!-- Types -->
    <p class="label">Types</p>
    <div class="grid grid-cols-6 gap-2 mb-6">
      <button onclick="toast('Hello!')" class="b">Default</button>
      <button onclick="toast.success('Saved!')" class="b !text-emerald-600 dark:!text-emerald-400">Success</button>
      <button onclick="toast.error('Failed!')" class="b !text-red-500 dark:!text-red-400">Error</button>
      <button onclick="toast.warning('Careful!')" class="b !text-amber-600 dark:!text-amber-400">Warning</button>
      <button onclick="toast.info('FYI!')" class="b !text-blue-600 dark:!text-blue-400">Info</button>
      <button onclick="toast.loading('Wait...')" class="b !text-indigo-600 dark:!text-indigo-400">Loading</button>
    </div>

    <!-- Async -->
    <p class="label">Async</p>
    <div class="grid grid-cols-4 gap-2 mb-6">
      <button onclick="testPromise(1)" class="b">Promise ✓</button>
      <button onclick="testPromise(0)" class="b">Promise ✗</button>
      <button onclick="testConfirm()" class="b">Confirm</button>
      <button onclick="testAlert()" class="b">Alert</button>
    </div>

    <!-- Options -->
    <p class="label">Options</p>
    <div class="grid grid-cols-4 gap-2 mb-6">
      <button onclick="testUndo()" class="b">Undo action</button>
      <button onclick="testUpdate()" class="b">Load → Done</button>
      <button onclick="testTitle()" class="b">Title + desc</button>
      <button onclick="testCustom()" class="b">Custom HTML</button>
    </div>

    <!-- Config -->
    <p class="label">Config</p>
    <div class="p-3 rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 mb-5 space-y-2">
      <div class="flex items-center justify-between">
        <span class="text-[11px] text-zinc-500 dark:text-zinc-400">Close button</span>
        <label class="sw"><input type="checkbox" id="cfg-close" checked onchange="applyConf()"><span class="sl"></span></label>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-[11px] text-zinc-500 dark:text-zinc-400">Progress bar</span>
        <label class="sw"><input type="checkbox" id="cfg-prog" checked onchange="applyConf()"><span class="sl"></span></label>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-[11px] text-zinc-500 dark:text-zinc-400">Deduplication</span>
        <label class="sw"><input type="checkbox" id="cfg-dedup" checked onchange="applyConf()"><span class="sl"></span></label>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-[11px] text-zinc-500 dark:text-zinc-400">Duration</span>
        <div class="flex gap-1">
          <button onclick="setDur(1000)" class="dur">1s</button>
          <button onclick="setDur(3500)" class="dur active" id="dur-3500">3.5s</button>
          <button onclick="setDur(5000)" class="dur">5s</button>
          <button onclick="setDur(0)" class="dur">∞</button>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-[11px] text-zinc-500 dark:text-zinc-400">Toast theme</span>
        <div class="flex gap-1">
          <button onclick="setToastTheme('auto')" class="dur active" id="th-auto">Auto</button>
          <button onclick="setToastTheme('light')" class="dur" id="th-light">Light</button>
          <button onclick="setToastTheme('dark')" class="dur" id="th-dark">Dark</button>
        </div>
      </div>
    </div>

    <!-- Position -->
    <p class="label">Position</p>
    <div class="grid grid-cols-3 gap-1 p-3 rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 mb-5">
      <button onclick="setPos('top-left')" class="p">TL</button>
      <button onclick="setPos('top-center')" class="p">TC</button>
      <button onclick="setPos('top-right')" class="p active">TR</button>
      <button onclick="setPos('bottom-left')" class="p">BL</button>
      <button onclick="setPos('bottom-center')" class="p">BC</button>
      <button onclick="setPos('bottom-right')" class="p">BR</button>
    </div>

    <!-- Custom theme -->
    <p class="label">Custom Colors</p>
    <div class="grid grid-cols-4 gap-2 mb-6">
      <button onclick="setColor('success','#10b981')" class="b text-[10px]" style="color:#10b981">Success</button>
      <button onclick="setColor('error','#f43f5e')" class="b text-[10px]" style="color:#f43f5e">Error</button>
      <button onclick="setColor('radius','20px')" class="b text-[10px]">Round</button>
      <button onclick="resetColors()" class="b text-[10px]">Reset</button>
    </div>

    <!-- Dismiss -->
    <button onclick="toast.dismissAll()" class="w-full py-2 rounded-lg text-[12px] font-medium text-red-500 dark:text-red-400 border border-red-100 dark:border-red-900/40 hover:bg-red-50 dark:hover:bg-red-950/30 cursor-pointer transition-colors mb-8">Clear all</button>

    <!-- Footer -->
    <p class="text-center text-[10px] text-zinc-300 dark:text-zinc-700">
      <a href="https://pingtoast.1619.in" class="hover:text-zinc-500">docs</a> · <a href="https://github.com/KumarDeepak16/ping-toast" class="hover:text-zinc-500">github</a> · <a href="https://github.com/KumarDeepak16" class="hover:text-zinc-500">deepak kumar</a>
    </p>
  </div>

  <style>
    .label{font-size:10px;font-weight:600;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
    .dark .label{color:#52525b}
    .b{padding:8px 0;border-radius:10px;border:1px solid #e4e4e7;background:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
    .b:hover{border-color:#a1a1aa;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .b:active{transform:scale(.97)}
    .dark .b{border-color:#27272a;background:#18181b}
    .dark .b:hover{border-color:#3f3f46}
    .p{padding:6px 0;border-radius:6px;font-size:10px;font-weight:600;color:#a1a1aa;cursor:pointer;transition:all .12s;background:transparent}
    .p:hover{background:#e4e4e7;color:#3f3f46}
    .p.active{background:#6366f1;color:#fff}
    .dark .p:hover{background:#27272a;color:#d4d4d8}
    .dark .p.active{background:#6366f1;color:#fff}
    .sw{position:relative;width:32px;height:18px;display:inline-block}
    .sw input{opacity:0;width:0;height:0}
    .sl{position:absolute;cursor:pointer;inset:0;background:#d4d4d8;border-radius:9px;transition:.2s}
    .sl:before{content:'';position:absolute;height:14px;width:14px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
    .sw input:checked+.sl{background:#6366f1}
    .sw input:checked+.sl:before{transform:translateX(14px)}
    .dark .sl{background:#3f3f46}
    .dur{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:500;color:#a1a1aa;cursor:pointer;transition:all .12s;background:transparent;border:none}
    .dur:hover{color:#3f3f46}
    .dur.active{background:#6366f1;color:#fff}
    .dark .dur:hover{color:#d4d4d8}
    .dark .dur.active{background:#6366f1;color:#fff}
  </style>

  <script type="module">
    import{toast,createToaster,applyTheme,setTheme}from'ping-toast'
    createToaster({position:'top-right',duration:3500})
    window.toast=toast
    if(matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.classList.add('dark');applyTheme('dark')}
    document.getElementById('t').onclick=()=>{const d=document.documentElement.classList.toggle('dark');applyTheme(d?'dark':'light')}
    window.testPromise=(ok)=>{const p=new Promise((r,j)=>setTimeout(()=>ok?r({count:42}):j(new Error('Network error')),2e3));toast.promise(p,{loading:'Fetching...',success:d=>`${d.count} items`,error:e=>e.message})}
    window.testConfirm=async()=>{(await toast.confirm('Delete?',{confirm:'Delete',cancel:'Keep'}))?toast.success('Deleted!'):toast.info('Cancelled')}
    window.testAlert=async()=>{await toast.alert('Session expired');toast.info('Dismissed')}
    window.testUndo=()=>toast.error('Deleted',{action:{label:'Undo',onClick:id=>{toast.dismiss(id);toast.success('Restored!')}}})
    window.testUpdate=()=>{const id=toast.loading('Uploading...');setTimeout(()=>toast.update(id,{type:'success',message:'Done!',duration:3e3}),2e3)}
    window.testTitle=()=>toast.success('Deployed',{title:'Production',description:'v2.1.0 → 3 regions'})
    window.testCustom=()=>toast.custom(()=>`<div style="padding:12px 16px;display:flex;gap:10px;align-items:center"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#ec4899);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px">PT</div><div><strong style="font-size:13px">PingToast</strong><div style="font-size:11px;opacity:.5">Custom render</div></div></div>`,{duration:5e3})
    window.setPos=(p)=>{document.querySelectorAll('.p').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');createToaster({position:p});toast.success(p)}
    window.applyConf=()=>{createToaster({closable:document.getElementById('cfg-close').checked,progress:document.getElementById('cfg-prog').checked,dedup:document.getElementById('cfg-dedup').checked});toast.info('Config updated')}
    window.setDur=(d)=>{document.querySelectorAll('.dur').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');createToaster({duration:d});toast.info(d?d+'ms':'Persistent')}
    window.setToastTheme=(m)=>{['auto','light','dark'].forEach(t=>document.getElementById('th-'+t).classList.remove('active'));document.getElementById('th-'+m).classList.add('active');applyTheme(m);toast.info('Theme: '+m)}
    window.setColor=(k,v)=>{setTheme({[k]:v});toast.success(k+': '+v)}
    window.resetColors=()=>{setTheme({success:'#22c55e',error:'#ef4444',warning:'#f59e0b',info:'#3b82f6',radius:'14px'});toast.info('Colors reset')}
    window.fireCustom=()=>{const m=document.getElementById('msg').value||'Hello!';const t=document.getElementById('msg-type').value;if(t==='default')toast(m);else toast[t](m)}
  </script>
</body>
</html>
